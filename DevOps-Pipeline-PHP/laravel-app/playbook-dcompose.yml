---
- name: "Run Docker-Compose using ansible playbook"
  hosts: localhost
  tasks:

    - name: Stop and remove containers (if exist)
      command: docker-compose down
      ignore_errors: yes

    - name: Remove app image (ignore if not exist)
      command: docker rmi abdo1997.mohamed2030/laravel-app
      ignore_errors: yes

    - name: Remove php-apache image (ignore if not exist)
      command: docker rmi php:7.4.1-apache
      ignore_errors: yes

    - name: Remove mysql image (ignore if not exist)
      command: docker rmi mysql:5.7
      ignore_errors: yes

    - name: Remove phpmyadmin image (ignore if not exist)
      command: docker rmi phpmyadmin/phpmyadmin
      ignore_errors: yes

    - name: Build and start Docker Compose
      command: docker-compose up -d
      args:
        chdir: "{{ playbook_dir }}"   # ensure docker-compose runs in correct folder

    - name: Wait for containers to be healthy
      shell: |
        docker ps --filter "status=running" --format '{{.Names}}' | grep laravel-app_php-apache-environment_1
      register: container_running
      retries: 5
      delay: 3
      until: container_running.rc == 0

    - name: Run composer update inside PHP container
      command: docker exec -i laravel-app_php-apache-environment_1 sh -c "composer update"